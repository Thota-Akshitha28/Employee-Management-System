{% extends "base.html" %}

{% block content %}
<center>
    <h2><i class="fas fa-key"></i> Forgot Password</h2>
    <form action="/send_reset_link" method="post">
        <input type="email" name="email" placeholder="Your registered email" required>
        <button type="submit"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
    </form>
    <br>
    <a href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a>
</center>
{% endblock %}
